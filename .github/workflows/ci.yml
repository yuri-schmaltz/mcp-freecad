name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" || python -m pip install pytest pytest-cov hypothesis
      - name: Run tests with coverage
        shell: bash
        run: |
          python -m pytest --cov=src/freecad_mcp --cov=addon/FreeCADMCP/rpc_server --cov-report=term --cov-report=xml --cov-fail-under=50
      - name: Upload coverage artifact
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  freecad-addon-syntax:
    name: FreeCAD addon syntax (FreeCAD ${{ matrix.freecad-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # We test against the addon files only, not the full FreeCAD stack.
        # Each FreeCAD release ships its own Python (3.10 for 0.21, 3.11 for
        # 1.0, 3.11+ for 1.1), so the syntax check is what matters here.
        freecad-version: ["0.21", "1.0", "1.1"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Compile addon
        run: |
          # Every Python file in the addon directory must compile against
          # whatever Python the runner ships (3.12 here). If FreeCAD's
          # bundled Python is older and rejects a feature, the user's
          # ``pyproject.toml`` ``requires-python = ">=3.12"`` is the
          # authoritative guard; this job is a "no syntax errors" gate.
          echo "Compiling addon modules..."
          python -m compileall -q addon/FreeCADMCP/rpc_server || exit 1
          echo "Verifying Init.py / InitGui.py..."
          python -c "import ast; ast.parse(open('addon/FreeCADMCP/Init.py').read())"
          python -c "import ast; ast.parse(open('addon/FreeCADMCP/InitGui.py').read())"
      - name: Verify expected public surface
        run: |
          # The addon is loaded by FreeCAD as a package; verify that
          # rpc_server.py still re-exports the names InitGui.py relies
          # on. This catches accidental rename of public symbols during
          # refactors (e.g. T3.1's decomposition of rpc_server.py).
          # InitGui.py uses two patterns:
          #   1. `from rpc_server import X`  →  import-bound names
          #   2. `rpc_server.X(...)`  →  attribute-bound names
          # We verify both. We parse rpc_server.py's AST so multi-line
          # imports and re-exports are handled correctly (a regex would
          # miss them).
          python <<'PY'
          import ast
          import re
          import sys
          from pathlib import Path
          init_gui = Path("addon/FreeCADMCP/InitGui.py").read_text()
          rpc_server_path = Path("addon/FreeCADMCP/rpc_server/rpc_server.py")
          rpc_server_src = rpc_server_path.read_text()

          # Build the set of public names defined or re-exported by
          # rpc_server.py via AST: every top-level def / class, plus
          # every name bound by a top-level import.
          tree = ast.parse(rpc_server_src)
          defined: set[str] = set()
          for node in tree.body:
              if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef, ast.ClassDef)):
                  defined.add(node.name)
              elif isinstance(node, ast.Assign):
                  for target in node.targets:
                      if isinstance(target, ast.Name):
                          defined.add(target.id)
              elif isinstance(node, ast.Import):
                  for alias in node.names:
                      defined.add(alias.asname or alias.name.split(".")[0])
              elif isinstance(node, ast.ImportFrom):
                  for alias in node.names:
                      defined.add(alias.asname or alias.name)

          ok = True
          # Pattern 1: from rpc_server import X
          imports = re.findall(r"from\s+rpc_server\s+import\s+([^#\n]+)", init_gui)
          for line in imports:
              for name in line.replace("(", "").replace(")", "").split(","):
                  name = name.strip()
                  if not name or name == "*" or name == "rpc_server":
                      continue
                  if name not in defined:
                      print(f"FAIL: InitGui.py imports {name!r} from rpc_server but rpc_server.py does not define or re-export it")
                      ok = False
          # Pattern 2: rpc_server.X(...)
          attr_calls = set(re.findall(r"\brpc_server\.(\w+)\s*\(", init_gui))
          for name in attr_calls:
              if name not in defined:
                  print(f"FAIL: InitGui.py calls rpc_server.{name}(...) but rpc_server.py does not define or re-export it")
                  ok = False
          if not ok:
              sys.exit(1)
          print(f"OK: all public names referenced by InitGui.py are still defined or re-exported by rpc_server.py")
          PY

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Lint
        run: ruff check src/ tests/

  types:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Install mypy
        run: python -m pip install mypy
      - name: Type check
        run: mypy src/
