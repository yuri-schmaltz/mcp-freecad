name: release-please

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # release-please is bootstrapped on a manifest at the repo
          # root pointing to the python package. The action reads
          # release-please-config.json + .release-please-manifest.json
          # and produces a release PR whose body is auto-generated
          # from conventional commits.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Echo release info
        if: steps.release.outputs.release_created
        run: |
          echo "Release ${{ steps.release.outputs.tag_name }} created."
          echo "URL: ${{ steps.release.outputs.html_url }}"
