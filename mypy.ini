[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
ignore_missing_imports = True
check_untyped_defs = True
disable_error_code = no-redef,attr-defined,misc
# FastMCP ships without type stubs; do not chase that rabbit.
exclude = addon/FreeCADMCP/rpc_server/rpc_server\.py|addon/FreeCADMCP/rpc_server/serialize\.py|addon/FreeCADMCP/rpc_server/parts_library\.py|tests/


# ---- Module-specific relaxations ----------------------------------------

[mypy-freecad_mcp.freecad_client]
disallow_untyped_defs = False
warn_return_any = False

[mypy-freecad_mcp.server]
disallow_untyped_defs = False
warn_return_any = False

[mypy-freecad_mcp.utils]
disallow_untyped_defs = False

[mypy-freecad_mcp.responses]
disallow_untyped_defs = False

[mypy-freecad_mcp.operations.core]
disallow_untyped_defs = False