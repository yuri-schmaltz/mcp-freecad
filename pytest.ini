[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Default: skip integration tests that need a real FreeCAD.
addopts = -ra -q -m "not freecad"
filterwarnings =
    ignore::DeprecationWarning
markers =
    freecad: integration tests that require a running FreeCAD with the addon loaded (skipped by default)
    slow: tests that take more than 1 second (skipped by default in fast mode)